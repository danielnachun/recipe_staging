schema_version: 1

context:
  version: 2.2-22

package:
  name: r-coxme
  version: ${{ version|replace("-", "_") }}

source:
  url: https://cloud.r-project.org/src/contrib/coxme_${{ version }}.tar.gz
  sha256: 1bb492ea8cd5273a0361a0ec5525e799f33d9aa09e6dfd2a365a38a4673ae126

build:
  number: 0
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  build:
    - ${{ compiler('c') }}
    - make
  host:
    - r-base
    - r-matrix >=1.0
    - r-bdsmatrix >=1.3
    - r-nlme
    - r-survival >=2.36.14
  run:
    - r-base
    - r-matrix >=1.0
    - r-bdsmatrix >=1.3
    - r-nlme
    - r-survival >=2.36.14

tests:
  - script:
      - R -e "library('coxme')"

about:
  license: LGPL-2.0-only
  summary: Fit Cox proportional hazards models containing both fixed and random effects.  The
    random effects can have a general form, of which familial interactions (a "kinship"
    matrix) is a particular special case. Note that the simplest case of a mixed effects
    Cox model, i.e. a single random per-group intercept, is also called a "frailty"
    model.  The approach is based on Ripatti and Palmgren, Biometrics 2002.
  homepage: https://CRAN.R-project.org/package=coxme

extra:
  recipe-maintainers:
    - danielnachun
