schema_version: 1

context:
  version: "1.12.1"

package:
  name: julia
  version: ${{ version }}

source:
  url: https://github.com/JuliaLang/julia/releases/download/v${{ version }}/julia-${{ version }}-full.tar.gz
  sha256: 891d16bb91c8a94d5a6355a82c17fa3c2458eb89160d428443a0b2a1b841ea52
  patches:
    - patches/julia-hardcoded-libs.patch
    - if: linux
      then: patches/julia-libunwind-1.6.patch
    - patches/disable-some-gmp-tests.patch
    - patches/disable-some-cmdlineargs-test.patch
    - patches/bf16_darwin.patch
    - patches/repl-precompile.patch

build:
  number: 2
  skip: win
  dynamic_linking:
    binary_relocation: false

requirements:
  build:
    - curl
    - llvmdev
    - make
    - perl
    - python =3.14
    - ${{ compiler('fortran') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - if: linux
      then:
        - binutils
  host:
    - openblas-ilp64
    - if: linux
      then: patchelf
    - openlibm
    - gmp
    - if: not osx
      then: libgit2
    - libssh2
    - if: osx
      then: libosxunwind
    - if: linux
      then: libunwind
    - mpfr
    - arpack
    - suitesparse
    - pcre2
    - libutf8proc
    - libnghttp2
    - zlib
    - p7zip
  run:
    - openblas-ilp64
    - if: osx
      then: libosxunwind
    - if: linux
      then: libunwind
    - gmp
    - openlibm
    - arpack
    - suitesparse
    - pcre2
    - curl
    - if: not osx
      then: libgit2
    - libssh2
    - mpfr
    - git
    - libutf8proc
    - libnghttp2
    - zlib
    - p7zip

tests:
  - requirements:
      run:
        - perl
    script:
      - julia -e 'using InteractiveUtils; InteractiveUtils.versioninfo()'
      - echo $CONDA_JL_HOME
      - echo $CONDA_JL_CONDA_EXE
      - echo $CI
      # - CI=false julia -e 'Base.runtests(["subarray", "core", "compiler", "worlds", "keywordargs", "numbers", "subtype", "char", "strings", "triplequote", "unicode", "intrinsics", "dict", "hashing", "iobuffer", "staged", "offsetarray", "arrayops", "tuple", "reduce", "reducedim", "abstractarray", "intfuncs", "simdloop", "vecelement", "rational", "copy", "math", "fastmath", "functional", "iterators", "operators", "ordering", "path", "ccall", "parse", "gmp", "sorting", "spawn", "backtrace", "exceptions", "file", "read", "version", "namedtuple", "mpfr", "broadcast", "complex", "floatapprox", "reflection", "regex", "float16", "combinatorics", "sysinfo", "env", "rounding", "ranges", "mod2pi", "euler", "show", "client", "errorshow", "sets", "goto", "llvmcall", "llvmcall2", "ryu", "some", "meta", "stacktraces", "docs", "misc", "stress", "binaryplatforms", "atexit", "enums", "int", "interpreter", "checked", "bitset", "floatfuncs", "precompile", "boundscheck", "error", "ambiguous", "cartesian", "osutils", "channels", "iostream", "secretbuffer", "specificity", "reinterpretarray", "syntax", "corelogging", "missing", "asyncmap", "smallarrayshrink", "download", "opaque_closure", "filesystem"]; ncores=ceil(Int, Sys.CPU_THREADS))'
      # - CI=false julia --project -e 'delete!(ENV, "JULIA_PROJECT"); delete!(ENV, "JULIA_LOAD_PATH"); Base.runtests(["loading", "cmdlineargs"])'
      # - CI=false julia -e 'import Pkg;Pkg.add("LibSSH2_jll")'
      # - CI=false julia -e 'import Pkg;Pkg.add("Sundials")'
      # - echo $JULIA_CONDAPKG_BACKEND
      # - CI=false julia -e 'import Pkg; Pkg.add("CondaPkg"); using CondaPkg; CondaPkg.add_channel("conda-forge"); CondaPkg.status(); CondaPkg.current_packages()'
      # - CI=false julia -e 'import Pkg; Pkg.add("CondaPkg"); using CondaPkg; CondaPkg.add_channel("conda-forge"); print(CondaPkg.conda_cmd())'

about:
  license: MIT
  license_file: LICENSE.md
  summary: A high-performance dynamic programming language for data science
  description: |
    Julia is a high-level, high-performance dynamic language for technical computing.
    The main homepage for Julia can be found at julialang.org.
  homepage: http://julialang.org/
  repository: https://github.com/JuliaLang/julia
  documentation: https://docs.julialang.org

extra:
  recipe-maintainers:
    - SylvainCorlay
    - bgruening
    - dfornika
    - acaprez
    - mariusvniekerk
    - abhi18av
    - mkitti
    - ngam
