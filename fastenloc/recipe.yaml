schema_version: 1

context:
  version: 3.2

package:
  name: fastenloc
  version: ${{ version }}

source:
  url: https://github.com/xqwen/fastenloc/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d107e269764c28cd2cfec5218e560bc82694735d344978f4638fec9dbfe37757

build:
  number: 0

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
  host:
    - libblas
    - liblapack
    - gsl
    - if: linux
      then: libgomp
      else: llvm-openmp
    - zlib

tests:
  - script: |
      fastenloc 2>&1 | grep -q 'Error: number of total GWAS variants is unspecified'

about:
  license: GPL-3.0-or-later
  summary: Fast enrichment estimation aided colocalization analysis
  homepage: https://github.com/xqwen/fastenloc

extra:
  recipe-maintainers:
    - danielnachun
