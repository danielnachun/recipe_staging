schema_version: 1

context:
  version: 0.3.0

package:
  name: r-mvsusier
  version: ${{ version }}

source:
  url: https://github.com/stephenslab/mvsusieR/archive/${{ version }}.tar.gz
  sha256: 7b1e1ea7ffb144d9841c6f84457125dcc7abc8769b0ad229aa7d3af98cce8139

build:
  number: 0
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
  host:
    - r-abind
    - r-ashr
    - r-base
    - r-cowplot
    - r-ggplot2
    - r-ggrepel
    - r-mashr
    - r-matrixstats
    - r-mixsqp
    - r-mvtnorm
    - r-rcpp
    - r-rcpparmadillo
    - r-rlang
    - r-susier
  run:
    - r-abind
    - r-ashr
    - r-base
    - r-cowplot
    - r-ggplot2
    - r-ggrepel
    - r-mashr
    - r-matrixstats
    - r-mixsqp
    - r-mvtnorm
    - r-rcpp
    - r-rcpparmadillo
    - r-rlang
    - r-susier

tests:
  - script:
      - R -e "library('mvsusieR')"

about:
  license: GPL-3.0-or-later
  license_file: LICENSE.md
  summary: |
    Implements a multivariate generalization of the "Sum of
    Single Effects" (SuSiE) model for variable selection in multivariate
    linear regression.
  homepage: https://github.com/stephenslab/mvsusier
