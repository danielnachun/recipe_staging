context:
  version: 2.0210

package:
  name: perl-xml-libxml
  version: ${{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/S/SH/SHLOMIF/XML-LibXML-${{ version }}.tar.gz
  sha256: a29bf3f00ab9c9ee04218154e0afc8f799bf23674eb99c1a9ed4de1f4059a48d

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - make
  host:
    - perl=5.32
    - perl-xml-sax
    - perl-xml-namespacesupport
    - perl-alien-build
    - perl-alien-libxml2
    - liblzma-devel
    - libxml2-devel
    - zlib
  run:
    - perl>=5.32
    - perl-xml-sax
    - perl-xml-namespacesupport
    - perl-alien-libxml2
    - ${{ pin_compatible("libxml2", lower_bound="x.x", upper_bound="x.x") }}

tests:
  - perl:
      uses:
        - XML::LibXML
        - XML::LibXML::AttributeHash
        - XML::LibXML::Boolean
        - XML::LibXML::Common
        - XML::LibXML::Devel
        - XML::LibXML::ErrNo
        - XML::LibXML::Error
        - XML::LibXML::Literal
        - XML::LibXML::NodeList
        - XML::LibXML::Number
        - XML::LibXML::Reader
        - XML::LibXML::SAX
        - XML::LibXML::SAX::Builder
        - XML::LibXML::SAX::Generator
        - XML::LibXML::SAX::Parser
        - XML::LibXML::XPathContext

about:
  license: Artistic-1.0-Perl OR GPL-1.0-or-later
  license_file:
    - perlartistic.1
    - perlgpl.1
  summary: Interface to Gnome libxml2 xml parsing and DOM library
  homepage: https://bitbucket.org/shlomif/perl-xml-libxml

extra:
  recipe-maintainers:
    - danielnachun
