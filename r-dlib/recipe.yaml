schema_version: 1

context:
  version: "1.0.3.1"

package:
  name: r-dlib
  version: ${{ version }}

source:
  url:
    - https://cloud.r-project.org//src/contrib/dlib_${{ version }}.tar.gz
  sha256: cbda5cc584f725f67621580253ed36ff09b5544b2358d2d0ff0ac83f1ca190e5

build:
  number: 0
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - make
  host:
    - r-base
    - r-rcpp
  run:
    - r-base
    - r-rcpp

tests:
  - script:
      - R -e "library('dlib')"

about:
  license: BSL-1.0
  summary: Interface for 'Rcpp' users to 'dlib' <http://dlib.net> which is a 'C++' toolkit containing
    machine learning algorithms and computer vision tools. It is used in a wide range
    of domains including robotics, embedded devices, mobile phones, and large high performance
    computing environments. This package allows R users to use 'dlib' through 'Rcpp'.
  homepage: https://CRAN.R-project.org/package=dlib

extra:
  recipe-maintainers:
    - conda-forge/r
