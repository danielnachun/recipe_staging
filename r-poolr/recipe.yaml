schema_version: 1

context:
  version: 1.2-0

package:
  name: r-poolr
  version: ${{ version|replace("-", "_") }}

source:
  url: https://cloud.r-project.org//src/contrib/poolr_${{ version }}.tar.gz
  sha256: e349bc5145c10c504e18221abbda74af732f491d9a8e1b11f4630c9477a031c5

build:
  number: 0
  noarch: generic
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  host:
    - r-base
    - r-mathjaxr
  run:
    - r-base
    - r-mathjaxr

tests:
  - script:
      - R -e "library('poolr')"

about:
  license: GPL-2.0-only
  summary: Functions for pooling/combining the results (i.e., p-values) from (dependent) hypothesis
    tests. Included are Fisher's method, Stouffer's method, the inverse chi-square method,
    the Bonferroni method, Tippett's method, and the binomial test. Each method can
    be adjusted based on an estimate of the effective number of tests or using empirically
    derived null distribution using pseudo replicates. For Fisher's, Stouffer's, and
    the inverse chi-square method, direct generalizations based on multivariate theory
    are also available (leading to Brown's method, Strube's method, and the generalized
    inverse chi-square method). An introduction can be found in Cinar and Viechtbauer
    (2022) <doi:10.18637/jss.v101.i01>.
  homepage: https://CRAN.R-project.org/package=poolr

