schema_version: 1

context:
  version: "0.1.2"

package:
  name: r-blosc
  version: ${{ version }}

source:
  url:
    - https://cloud.r-project.org/src/contrib/blosc_${{ version }}.tar.gz
  sha256: f932785ccc631713edd73246575eb71b05c0e1d65a9b435d1ec651289440d335

build:
  number: 0
  dynamic_linking:
    rpaths:
      - lib/R/lib/
      - lib/

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - autoconf
    - automake
    - pkg-config
    - make
  host:
    - blosc
    - r-base
    - r-cpp11
  run:
    - r-base
    - r-cpp11

tests:
  - script:
      - if: not win
        then: R -e "library('blosc')"

about:
  license: GPL-3.0-only
  summary: Arrays of structured data types can require large volumes of disk space to store.
    'Blosc' is a library that provides a fast and efficient way to compress such data.
    It is often applied in storage of n-dimensional arrays, such as in the case of the
    geo-spatial 'zarr' file format. This package can be used to compress and decompress
    data using 'Blosc'.
  homepage: https://pepijn-devries.github.io/blosc/, https://github.com/pepijn-devries/blosc/

